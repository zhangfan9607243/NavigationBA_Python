site_name: 领航国际教育 - BA专业自学系列课程
site_description: 领航国际教育 - BA专业自学系列课程
site_url: https://navigationba.github.io/NavigationBA_Basics/
site_dir: site
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs        # 顶部导航标签
    - navigation.sections    # 子导航分组
    - navigation.top
    - navigation.tracking
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: blue   # 主色（导航栏背景）
      accent: blue    # 强调色（按钮、链接高亮）
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: 切换到日间模式

markdown_extensions:
  - admonition
  - md_in_html
  - toc:
      permalink: true
      title: 本章目录
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

plugins:
  - search
  - mkdocs-jupyter

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js


